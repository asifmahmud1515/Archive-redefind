name: Build AI Studio APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # 3️⃣ Install dependencies (works without package-lock.json)
      - name: Install Dependencies
        run: npm install

      # 4️⃣ Install Expo CLI & EAS CLI (optional, only if using Expo)
      - name: Install Expo & EAS CLI
        run: |
          npm install -g expo-cli eas-cli

      # 5️⃣ Inject Gemini API Key safely
      - name: Inject Gemini API Key
        run: echo "VITE_GEMINI_API_KEY=${{ secrets.VITE_GEMINI_API_KEY }}" >> $GITHUB_ENV

      # 6️⃣ Optional: create .env file for runtime
      - name: Create .env file
        run: echo "VITE_GEMINI_API_KEY=${{ secrets.VITE_GEMINI_API_KEY }}" > .env

      # 7️⃣ Build web app (Vite/React)
      - name: Build Web App
        run: npm run build

      # 8️⃣ Capacitor Sync for Android (skip if using Expo)
      - name: Capacitor Sync
        run: |
          npx cap copy android
          npx cap sync android

      # 9️⃣ Build Android APK
      - name: Build APK
        run: |
          cd android
          ./gradlew assembleRelease

      # 🔟 Upload APK artifact (latest version v4)
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AIStudio-App-Release.apk
          path: android/app/build/outputs/apk/release/app-release.apk

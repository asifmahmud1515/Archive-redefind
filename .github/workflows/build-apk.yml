name: Build AI Studio APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout source code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # 3️⃣ Install project dependencies
      - name: Install Dependencies
        run: npm ci

      # 4️⃣ Set Gemini API Key from GitHub Secrets
      - name: Inject Gemini API Key
        run: echo "VITE_GEMINI_API_KEY=${{ secrets.VITE_GEMINI_API_KEY }}" >> $GITHUB_ENV

      # 5️⃣ Optional: Create local .env for dev/test
      - name: Create .env file
        run: |
          echo "VITE_GEMINI_API_KEY=${{ secrets.VITE_GEMINI_API_KEY }}" > .env

      # 6️⃣ Build the web app (Vite/React)
      - name: Build Web App
        run: npm run build

      # 7️⃣ Sync with Capacitor for Android (React + Capacitor setup)
      - name: Capacitor Sync
        run: |
          npx cap copy android
          npx cap sync android

      # 8️⃣ Build Android APK
      - name: Build APK
        run: |
          cd android
          ./gradlew assembleRelease

      # 9️⃣ Upload APK as artifact
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: AIStudio-App-Release.apk
          path: android/app/build/outputs/apk/release/app-release.apk
